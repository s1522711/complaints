<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Complaints</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/theme.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      padding: 24px;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, #dc2626, #991b1b);
      padding: 28px 28px 24px;
      text-align: center;
      color: white;
    }

    .login-logo {
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }

    .login-header h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .login-header p { font-size: 13px; opacity: 0.8; }

    .login-body { padding: 28px; }

    .login-fields { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }

    .login-btn {
      width: 100%;
      justify-content: center;
      padding: 11px;
      font-size: 15px;
    }

    #login-error { display: none; margin-bottom: 16px; }

    .login-footer {
      text-align: center;
      padding: 16px 28px;
      border-top: 1px solid var(--gray-100);
      font-size: 12px;
      color: var(--gray-400);
    }

    .input-icon-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 15px;
      pointer-events: none;
    }

    .input-icon-wrap .form-input { padding-left: 38px; }

    [data-theme="dark"] body { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); }
    [data-theme="dark"] .login-box { background: #1e293b; border: 1px solid #334155; }
    [data-theme="dark"] .login-footer { border-color: #334155; }

    .theme-toggle-fixed {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 999;
    }
  </style>
</head>
<body>
  <button class="btn btn-secondary btn-sm theme-toggle theme-toggle-fixed" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
  <div class="login-box">
    <div class="login-header">
      <div class="login-logo">&#128274;</div>
      <h1>Admin Login</h1>
      <p>Sign in to access the complaints panel</p>
    </div>
    <div class="login-body">
      <div id="login-error" class="alert alert-error">
        <span class="alert-icon">&#9888;</span>
        <span id="login-error-text">Invalid credentials.</span>
      </div>

      <form class="login-fields" id="login-form" novalidate onsubmit="return false">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-icon-wrap">
            <span class="input-icon">&#128100;</span>
            <input class="form-input" type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">&#128274;</span>
            <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          </div>
        </div>
      </form>

      <button class="btn btn-primary login-btn" id="login-btn" onclick="doLogin()">
        <span id="login-label">Sign In</span>
      </button>
    </div>
    <div class="login-footer">
      Complaints Admin &mdash; Authorized access only
    </div>
  </div>

  <script>
    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');
      const label = document.getElementById('login-label');

      if (!username || !password) {
        errorEl.style.display = 'flex';
        document.getElementById('login-error-text').textContent = 'Please enter your username and password.';
        return;
      }

      errorEl.style.display = 'none';
      btn.disabled = true;
      label.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const json = await res.json();

        if (res.ok && json.success) {
          window.location.href = '/admin';
        } else {
          errorEl.style.display = 'flex';
          document.getElementById('login-error-text').textContent = json.error || 'Invalid credentials.';
          btn.disabled = false;
          label.textContent = 'Sign In';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        errorEl.style.display = 'flex';
        document.getElementById('login-error-text').textContent = 'Network error. Please try again.';
        btn.disabled = false;
        label.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
